# Optional: run Neo4j for MiroFish when using GRAPH_BACKEND=neo4j
#
# Start:  docker compose -f docker-compose.neo4j.yml up -d
# Stop:   docker compose -f docker-compose.neo4j.yml down
#
# No password required (dev only): NEO4J_AUTH=none
# In .env set: GRAPH_BACKEND=neo4j, NEO4J_URI=bolt://localhost:7687,
#              NEO4J_USER=neo4j, NEO4J_PASSWORD=neo4j (any value when auth is off)

services:
  neo4j:
    image: neo4j:5
    container_name: mirofish-neo4j
    environment:
      NEO4J_AUTH: none
    ports:
      - "7474:7474"   # HTTP (Browser UI)
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --try-1 -O /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
